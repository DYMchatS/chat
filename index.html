<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-box { width: 100%; max-width: 400px; height: 600px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #4a90e2; color: white; font-size: 18px; font-weight: bold; text-align: center; }
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; word-wrap: break-word; font-size: 14px; }
        .message-me { align-self: flex-end; background-color: #dcf8c6; border-bottom-right-radius: 0; }
        .message-other { align-self: flex-start; background-color: #ffffff; border: 1px solid #ddd; border-bottom-left-radius: 0; }
        .message-header { font-size: 11px; color: #888; margin-bottom: 3px; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
        button { margin-left: 10px; padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">聊天室 (<span id="username-display"></span>)</div>
        <div id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-button">发送</button>
        </div>
    </div>
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    // ⚠️ 请替换为你自己的 Supabase URL 和 Key
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; 
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // DOM 元素引用
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const usernameDisplay = document.getElementById('username-display');

    // 生成或获取随机用户名
    let currentUser = localStorage.getItem('chat_username');
    if (!currentUser) {
        currentUser = 'User_' + Math.floor(Math.random() * 10000);
        localStorage.setItem('chat_username', currentUser);
    }
    usernameDisplay.textContent = currentUser;

    // 发送消息函数
    async function sendMessage() {
        const content = messageInput.value.trim();
        if (!content) return;
        try {
            await supabase.from('messages').insert([{ content: content, username: currentUser, created_at: new Date().toISOString() }]);
            messageInput.value = '';
        } catch (err) { console.error('发送失败:', err); }
    }

    // 渲染单条消息到界面
    function renderMessage(msg) {
        const isMe = msg.username === currentUser;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isMe ? 'message-me' : 'message-other'}`;
        const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `<div class="message-header"><span class="message-user">${msg.username}</span><span class="message-time">${time}</span></div><div class="message-content">${escapeHtml(msg.content)}</div>`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 防 XSS 攻击的简单转义
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    // 加载历史消息
    async function loadMessages() {
        try {
            const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (error) throw error;
            chatContainer.innerHTML = ''; 
            data.forEach(renderMessage);
        } catch (err) { console.error('加载历史消息失败:', err); }
    }

    // 监听实时消息
    function subscribeToMessages() {
        supabase.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => { renderMessage(payload.new); })
            .subscribe();
    }

    // 事件绑定与启动
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    loadMessages();
    subscribeToMessages();
</script>
<!-- 在线用户列表区域 -->
<div id="online-users" style="padding: 10px; background: #f8f9fa; border-bottom: 1px solid #eee; font-size: 12px; color: #666;">
    <strong>在线用户：</strong><span id="user-list">加载中...</span>
</div>

<script>
// 更新在线用户列表显示
function updateOnlineUsers(users) {
    const userListEl = document.getElementById('user-list');
    if (users && users.length > 0) {
        userListEl.textContent = users.join(', ');
    } else {
        userListEl.textContent = '暂无在线用户';
    }
}

// 显示系统消息（如用户加入/离开）
function showSystemMessage(text) {
    const sysDiv = document.createElement('div');
    sysDiv.style.cssText = 'text-align: center; font-size: 12px; color: #999; padding: 5px 0;';
    sysDiv.textContent = `[系统] ${text}`;
    chatContainer.appendChild(sysDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>
<style>
    /* 在线用户列表悬浮效果 */
    #online-users { transition: background-color 0.3s; }
    #online-users:hover { background-color: #e9ecef; }
    
    /* 消息气泡动画 */
    .message { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
// 初始化时显示欢迎消息
window.addEventListener('DOMContentLoaded', () => {
    showSystemMessage(`欢迎回来，${currentUser}！`);
    updateOnlineUsers([]); // 初始化为空，后续可通过 Supabase 实时更新
});
</script>
</body>
</html>
